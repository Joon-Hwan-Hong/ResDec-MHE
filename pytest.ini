[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short

markers =
    cuda: marks tests as requiring CUDA (deselect with '-m "not cuda"')
    multi_gpu: marks tests as requiring multiple GPUs
    mixed_precision: marks tests as requiring mixed precision/AMP support
    slow: marks tests as slow-running (deselect with '-m "not slow"')

# Benign third-party warnings that do not affect test correctness.
# Each entry documents WHY the warning is safe to suppress.
filterwarnings =
    # ── Safe global filters: third-party noise we don't control ──
    # torch_geometric.distributed deprecation notice (no action needed)
    ignore:.*torch_geometric.distributed.*has been deprecated.*:DeprecationWarning
    # Lightning logs "does not have many workers" when num_workers=0 in tests
    ignore:.*does not have many workers.*:UserWarning
    # Lightning logs "GPU available but not used" in CPU-only test runs
    ignore:.*GPU available but not used.*:UserWarning
    # PyTorch scheduler.step() epoch parameter deprecation (harmless)
    ignore:.*epoch parameter in.*scheduler.step.*was not necessary.*:UserWarning
    # AnnData "Observation names are not unique" in synthetic test data
    ignore:.*Observation names are not unique.*:UserWarning
    # AnnData str-index coercion on synthetic test data with default integer indices.
    # Only fires in tests (production data always has str indices). Safe globally.
    ignore:.*Transforming to str index.*:UserWarning
    # Seaborn internal deprecation (vert → orientation). Will be fixed in seaborn update.
    ignore:.*vert.*will be deprecated.*:PendingDeprecationWarning
    #
    # ── NOT filtered globally (scoped to specific tests via @pytest.mark.filterwarnings): ──
    # - "Removed N subjects" → test_validates_subjects_exist
    # - "falling back to median split" → test_median_fallback_produces_balanced_split
    # - "Combining rare strata" → test_val_size_determined_by_n_folds
    # - "lr_scheduler.step before optimizer.step" → scheduler warmup/decay tests

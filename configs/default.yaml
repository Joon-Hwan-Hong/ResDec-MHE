# ═══════════════════════════════════════════════════════════════════════════════
# Cognitive Resilience Model - Default Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# Experiment metadata
experiment:
  name: "cognitive_resilience"
  run_name: "FixAttempt3"  # Human-readable tag for experiment dirs (e.g., "baseline-5fold", "hgt-ablation")
  seed: 42
  device: "auto"  # "auto", "cuda", "cpu"

# ─────────────────────────────────────────────────────────────────────────────
# Data Configuration
# ─────────────────────────────────────────────────────────────────────────────

data:
  # Paths
  adata_path: "data/snRNAseq/adata_ROSMAP_merged.h5ad"
  cellchatdb_path: "data/database/CellChatDB_human_interaction.csv"
  metadata_path: "data/metadata_ROSMAP/"
  liana_cache_dir: "data/liana_cache/"
  precomputed_dir: "data/precomputed/"  # PrecomputedDataset .npz files (recommended for training)

  # Preprocessing
  preprocessing:
    n_hvg: 4000  # Preprocessing only — determines n_genes for the model after HVG selection
    target_sum: 10000.0
    min_cells_per_gene: 10

  # Cell type column
  cell_type_column: "supercluster_name"
  subject_column: "ROSMAP_IndividualID"

  # Target and pathology columns
  target_column: "cogn_global"
  pathology_columns:
    - "gpath"
    - "amylsqrt"
    - "tangsqrt"

  # Data splitting (True Stratified K-Fold CV)
  # Uses StratifiedKFold for disjoint validation sets across folds.
  # val_frac is derived: (1 - test_frac) / n_folds ≈ 18% with 5-fold on 90% pool
  splits:
    test_frac: 0.0  # No holdout — all subjects in 5-fold CV
    n_folds: 5      # CV folds (determines val size = 100%/5 = 20%)
    stratify_by:
      - "gpath"
      - "cogn_global"

  # Cell sampling for Set Transformer
  cell_sampling:
    max_cells_per_type: 1000
    min_cells_threshold: 50
    sampling_strategy: "random"  # "random", "stratified", "importance"

  # Fraction of subjects allowed to be missing from splits before raising an error
  max_missing_subject_fraction: 0.1

  # DataLoader
  dataloader:
    batch_size: 24
    num_workers: 12  # Only used in AnnData mode; PrecomputedDataset always uses 0 workers (heap-loaded, no I/O)
    pin_memory: true
    prefetch_factor: 2

# ─────────────────────────────────────────────────────────────────────────────
# Model Configuration
# ─────────────────────────────────────────────────────────────────────────────

model:
  # Dimensions
  n_genes: null  # Auto-detected from precomputed .pt files at runtime
  n_cell_types: 31
  # n_regions is fixed at 6 (from constants.N_REGIONS) — determined by dataset schema.
  # Do NOT add n_regions here; the model reads N_REGIONS from src.data.constants.
  d_embed: 64   # HPO3/4 found 64 optimal (21/25 top trials)
  d_fused: 64
  dropout: 0.1   # Shared dropout rate across branches

  # Gene Attention Gate (shared config for both HGT and CellTransformer gates)
  gene_gate:
    initial_temperature: 2.0
    # min_temperature, warmup_epochs, anneal_epochs, anneal_schedule are
    # controlled via training.temperature_annealing.* (not model config)

  # Branch 1: HGT Encoder (GeneAttentionGate → Linear → RegionHandler → HGT)
  hgt:
    n_layers: 3
    n_heads: 4
    # Edge types from CellChatDB
    edge_types:
      - "Secreted_Signaling"
      - "ECM_Receptor"
      - "Cell_Cell_Contact"
      - "Non_protein_Signaling"
      - "Novel_Uncharacterized"

  # Branch 2: Cell Transformer (GeneAttentionGate → Set Transformer)
  set_transformer:
    n_isab_layers: 2
    n_inducing_points: 32
    n_pma_seeds: 1
    n_heads: 4                   # Set Transformer attention heads (independent from HGT heads)
    condition_on_cell_type: true  # Cell-type-conditioned inducing points (novel)
    # max_cells_per_type and min_cells_threshold are controlled via
    # data.cell_sampling.* (not model config)

  # Region handling — n_regions is fixed at 6 (from constants.N_REGIONS).
  # RegionHandler uses learned weighted-mean pooling (see region_handler.py).

  # Fusion Layer (merges HGT and CellTransformer embeddings)
  fusion:
    type: cross_attention  # "concat", "concat_normalized", "cross_attention", "crossfuse", "crossfuse_blend"
    n_heads: 4             # Attention heads for attention-based fusion types (ignored by concat)

  # Pathology-Stratified Attention
  pathology_attention:
    d_cond: 64
    n_heads: 4
    n_pathology_features: 3

  # Branch ablation flags (both true by default).
  # Set to false to disable a branch for ablation studies.
  # Disabled branches pass zeros to the fusion layer.
  use_hgt_encoder: true
  use_cell_transformer: true

  # Gradient checkpointing (trades ~5% compute for 5-8 GB memory savings)
  use_gradient_checkpointing: true

  # torch.compile: fuses Linear+LN+GELU+Dropout into fewer CUDA kernels.
  # BayesianPredictionHead is excluded (Pyro incompatible).
  # WARNING: compilation is extremely RAM-hungry (~20-40 GB per module).
  # Only enable on machines with 128+ GB free RAM beyond training needs.
  use_torch_compile: false

  # Prediction Head
  head:
    type: "bayesian"  # "bayesian", "deterministic"
    d_hidden: 64
    target_mean: null  # Auto-computed from training set if null

# ─────────────────────────────────────────────────────────────────────────────
# Training Configuration
# ─────────────────────────────────────────────────────────────────────────────

training:
  max_epochs: 100
  early_stopping:
    patience: 15
    min_delta: 0.0001
    min_epochs: 55               # Don't stop before temperature annealing completes (5 warmup + 50 anneal)
    monitor: "val_nll"
    mode: "min"

  # Optimizer
  optimizer:
    type: "adamw"
    lr: 0.0001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    lrd: 0.9999  # Per-step LR decay for Bayesian SVI (ignored in deterministic mode)
    guide_lr: 0.005  # Separate LR for SVI guide params (25x encoder LR); null = use encoder LR

  # Learning rate scheduler
  scheduler:
    type: "cosine"               # Cosine annealing with linear warmup
    warmup_epochs: 5             # Linear warmup for LR scheduler (independent of temperature_annealing.warmup_epochs below)
    eta_min: 0.000001            # Minimum learning rate

  # Loss function
  loss:
    type: "beta_nll"  # "beta_nll" (Bayesian head) or "mse" (deterministic head)
    beta: 0.5  # For beta_nll: 0=MSE, 1=NLL

  # Temperature annealing (for gene attention gate)
  temperature_annealing:
    tau_max: 2.0                 # Starting temperature (soft)
    tau_min: 0.1                 # Final temperature (sharp)
    warmup_epochs: 5             # Keep tau_max for this many epochs (independent of scheduler.warmup_epochs above)
    anneal_epochs: 50            # Anneal over this many epochs
    schedule: "exponential"      # Annealing schedule: "exponential", "linear", "cosine"

  # KL annealing (Bayesian head only)
  kl_annealing:
    enabled: true
    alpha_min: 0.01            # Floor >0 to maintain minimal regularization
    warmup_epochs: 5           # Must be <= temperature_annealing.warmup_epochs
    schedule: "linear"         # Linear ramp from alpha_min to 1.0
    temperature: 1.0           # Cold posterior (Wenzel et al., 2020): T<1 scales down KL. 1.0 = standard.

  # Gradient clipping (L2 norm). Under bf16-mixed, parameter gradients are
  # float32 (master weights), so this threshold applies to unscaled norms.
  gradient_clip_val: 1.0

  # Gradient modulation — OGM-GE (Peng et al., CVPR 2022)
  # Suppresses dominant branches to reduce gradient imbalance.
  # NOTE: Ablation showed OGM-GE is harmful (R² drops 0.35). Disabled by default.
  gradient_modulation:
    enabled: false
    method: "ogm_ge"
    alpha: 1.0              # Suppression sensitivity (paper tunes per dataset)
    ge_enabled: true         # GE noise injection for generalization
    log_modulation: false    # Log k_i values to TensorBoard

  # Mixed precision
  # NOTE: Results are tied to this precision setting. Changing between bf16-mixed
  # and 32-true produces different numerics (not a bug — expected FP behavior).
  # Results are only reproducible on the same GPU architecture (TF32 rounding
  # varies across generations, e.g., Ampere vs Ada Lovelace).
  # For strict cross-machine reproducibility, set:
  #   torch.set_float32_matmul_precision("highest")
  # at the cost of ~2-3x slower float32 matmuls.
  precision: "bf16-mixed"  # "bf16-mixed" (Ada GPUs), "32-true" (debug), "16-mixed"

  # Distributed training
  devices: "auto"                # Device IDs: "auto", 1, 2, [0,1], etc.
  strategy: "ddp"                # subprocess-based DDP. Uses staggered MAP_SHARED loading + /dev/shm for zero-copy data sharing across ranks.
  lr_scaling: true               # Scale LR linearly with effective GPU count (Goyal et al. 2017)

  # Checkpointing
  checkpoint:
    save_top_k: 3
    monitor: "val_nll"
    mode: "min"
    save_last: true

  # Regularization
  regularization:
    gene_gate_l1: 0.0            # L1 penalty on gene gate logits (0 = disabled)

  # Logging
  logging:
    log_every_n_steps: 10
    val_check_interval: 1.0  # Check every epoch

# ─────────────────────────────────────────────────────────────────────────────
# Hyperparameter Optimization (Optuna)
# ─────────────────────────────────────────────────────────────────────────────

optuna:
  n_trials: 100
  timeout: null  # No global timeout — n_trials is the stopping condition
  pruner:
    type: "median"
    n_startup_trials: 5
    # n_warmup_steps: Number of EPOCHS to complete before pruning.
    # Epoch-level pruning uses global_step = fold_idx * max_epochs + epoch
    # to avoid cross-fold step collisions. n_warmup_steps=10 lets temperature
    # and KL annealing warmup (5 epochs each) settle before the pruner acts.
    n_warmup_steps: 10
    interval_steps: 1  # Check at every validation epoch
  sampler:
    type: "tpe"
    seed: 42
    n_startup_trials: 10

  # Search space
  search_space:
    # Narrowed ranges from 100-trial HPO (round 1). Fixed categoricals where
    # signal was unambiguous; continuous ranges tightened to top-25% region.
    lr:
      type: "loguniform"
      low: 0.00005
      high: 0.001
    d_embed:
      type: "categorical"
      choices: [64]  # 21/25 top trials; 128/256 consistently worse
    dropout:
      type: "uniform"
      low: 0.08
      high: 0.28
    n_hgt_layers:
      type: "int"
      low: 2
      high: 2  # 24/25 top trials; 3-4 layers overfit
    beta:
      type: "uniform"
      low: 0.03
      high: 0.6
    weight_decay:
      type: "loguniform"
      low: 0.00005
      high: 0.003
    batch_size:
      type: "categorical"
      choices: [16]  # 32/64 cause OOM on 48 GB GPUs
    n_heads:
      type: "categorical"
      choices: [2, 4, 8]
    n_inducing:
      type: "categorical"
      choices: [64]  # 15/25 top trials; mean_nll=0.65 vs 0.79 for 16
    gene_gate_temp:
      type: "uniform"
      low: 0.2
      high: 1.0
    guide_lr:
      type: "loguniform"
      low: 0.001
      high: 0.0025
    fusion_type:
      type: "categorical"
      choices: ["concat_normalized", "cross_attention", "crossfuse", "crossfuse_blend"]
    fusion_n_heads:
      type: "categorical"
      choices: [2, 4, 8]

# ─────────────────────────────────────────────────────────────────────────────
# Inference Configuration
# ─────────────────────────────────────────────────────────────────────────────

inference:
  # Posterior samples for Bayesian head uncertainty
  num_posterior_samples: 100

  # Attention extraction
  extract_attention: true
  attention_output_path: "outputs/attention/"

  # Batch processing
  batch_size: 32

# ─────────────────────────────────────────────────────────────────────────────
# Output Paths
# ─────────────────────────────────────────────────────────────────────────────

paths:
  output_dir: "outputs/"
  checkpoint_dir: "outputs/checkpoints/"
  logs_dir: "outputs/logs/"
  figures_dir: "outputs/figures/"
  predictions_dir: "outputs/predictions/"
  attention_dir: "outputs/attention/"

# ─────────────────────────────────────────────────────────────────────────────
# Error Handling
# ─────────────────────────────────────────────────────────────────────────────

error_handling:
  preprocessing:
    missing_metadata: "warn"     # Missing optional metadata: "fail", "warn", "ignore"
    corrupt_file: "fail"         # Corrupt/unreadable file: "fail"
    insufficient_cells: "skip"   # Subject with <50 total cells: "skip" subject
  training:
    nan_loss: "fail"             # NaN loss detected: "fail" immediately
    nan_batch: "skip"            # Single batch has NaN: "skip" batch, continue
    max_nan_skip_fraction: 0.1   # Max fraction of batches skipped per epoch before failing (0.1 = 10%)
  inference:
    missing_field: "skip"        # Subject missing required field: "skip" subject
  analysis:
    insufficient_data: "skip"    # Insufficient data for analysis: "skip", log warning

# ─────────────────────────────────────────────────────────────────────────────
# Reproducibility
# ─────────────────────────────────────────────────────────────────────────────

reproducibility:
  # Seed lives under experiment.seed (single source of truth)
  deterministic: true            # Use deterministic algorithms (slower but reproducible)
  benchmark: true                # cuDNN autotuner (reproducibility already broken, see below)
  # Note: Even with deterministic=true, CUDA runs are NOT bit-exact due to:
  #   1. scatter_add in HGT message passing (atomicAdd non-determinism)
  #   2. scatter_reduce_ in HGT softmax (amax reduction)
  #   3. nn.MultiheadAttention FlashAttention kernel with dropout
  # CPU runs ARE bit-exact. See src/utils/reproducibility.py for details.
  #
  # For full reproducibility, also set PYTHONHASHSEED=<seed> in the
  # launch environment (must be set before Python starts). The launch
  # scripts (run_all_folds_ngpu.sh, run_fold_slurm.sh) set this
  # automatically. HPO worker subprocesses inherit it from the
  # orchestrator environment.
  #
  # GPU architecture matters: TF32 tensor core rounding differs across
  # GPU generations (Ampere vs Ada Lovelace). Results are only
  # reproducible on the same GPU architecture with the same precision
  # setting. benchmark=false is required to avoid cuDNN autotuner
  # selecting different algorithms across runs.

# ─────────────────────────────────────────────────────────────────────────────
# Visualization
# ─────────────────────────────────────────────────────────────────────────────

visualization:
  dpi: 600                       # DPI for saved figures
  format: "png"                  # Output format for figures

# ─────────────────────────────────────────────────────────────────────────────
# Analysis
# ─────────────────────────────────────────────────────────────────────────────

analysis:
  # Resilience signature extraction
  resilience:
    n_permutations: 1000         # Number of permutations for significance testing
    apply_fdr_correction: true   # Whether to apply FDR correction across cell types
    fdr_method: "benjamini_hochberg"  # FDR method
    alpha: 0.05                  # Significance threshold
    run_ablation_study: false    # Whether to run ablation study (expensive)

  # Output settings
  output:
    save_attention_weights: true      # Save all attention weights to HDF5
    save_cell_level_attention: true   # Save cell-level attention (large files)
    top_n_genes: 100                  # Number of top genes per cell type to save
    top_n_interactions: 100           # Number of top CCC interactions to save

# ═══════════════════════════════════════════════════════════════════════════════
# ResDec-MHE canonical — TabPFN-2.6 as inference-time residual base.
# ═══════════════════════════════════════════════════════════════════════════════
#
# Training targets become y - y_tabpfn_oof (residuals from the cached
# within-train OOF predictions). Validation prediction is the composite
# ŷ = y_tabpfn_outer + f̂_1 where f̂_1 is the encoder+head output.
# TabPFN itself is NOT trained here — its predictions are read from the
# pre-computed .npz files.
#
# Cache files are fold-specific:
#   data/redesign/tabpfn_oof_fold{fold}.npz   — inner-OOF predictions for training
#   data/redesign/tabpfn_outer_fold{fold}.npz — outer-fold predictions for val
#
# Design note: this is the LIVE-encoder path (use_cached_embeddings: false) so
# we train encoder + head end-to-end.

experiment:
  run_name: "p5_phase2_tabpfn_residual"

model:
  # Dataset-specific dims (filled here because default.yaml leaves n_genes null).
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    # CANONICAL — n_stages=1 + TabM(k=8) + vanilla MHA + HyperConn + FiLM.
    # Chosen empirically from the ablation sweep on the 5-fold splits; the
    # TabPFN residual base is the only component whose removal produces a
    # large R² drop. Full metric suite in the paper-baseline table output.
    n_stages: 1
    # aux_lambdas length must match n_stages. At n=1, L_aux_1 == L_main exactly
    # (since prediction == stage_1), so λ_1=1 effectively double-weights MSE.
    aux_lambdas: [1.0]
    use_diff_attn: false  # canonical: vanilla nn.MultiheadAttention

training:
  # Flat-top-level overrides honoured by ResDecLightningModule.configure_optimizers.
  lr: 0.0015
  weight_decay: 5.6e-6
  # Residual-target + near-identity-init regime peaks early; 20 epochs leaves
  # ES patience room without wasteful post-peak training.
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    # Live-encoder regime.
    batch_size: 24
  use_cached_embeddings: false
  # TabPFN residual cache paths (fold index is filled by train script).
  tabpfn_oof_dir: data/redesign
  tabpfn_outer_dir: data/redesign

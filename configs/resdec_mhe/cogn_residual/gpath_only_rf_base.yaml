# ResDec-MHE on gpath-residualized cognition with RandomForest as residual base
# (replaces TabPFN-2.6). RF cache built via build_rf_cache_cogn_residual.py
# with same per-fold top-2K XGBoost-importance features as TabPFN. RF: n_estimators=100,
# max_depth=16, seed=42 — matches the standalone RF baseline (R²=0.197).
#
# Lightning module reads `tabpfn_oof_dir` / `tabpfn_outer_dir` agnostic to producer;
# pointing them at the rf_cache/ directory swaps the residual base. All other
# canonical hyperparameters preserved.

experiment:
  run_name: "cogn_residual_gpath_only_rf_base_seed42"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    use_diff_attn: false

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  residualize_against:
    axes: ["gpath"]
    cache_dir: "outputs/canonical/cogn_residual/gpath_only/cache"
  tabpfn_oof_dir: outputs/canonical/cogn_residual/gpath_only/rf_cache
  tabpfn_outer_dir: outputs/canonical/cogn_residual/gpath_only/rf_cache

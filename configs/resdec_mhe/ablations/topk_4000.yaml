# Ablation: TabPFN input increased from top-2000 → top-4000 XGBoost-importance
# features. Everything else matches canonical. Tests whether 2000 is clipping useful
# signal (expected: 4000 exceeds TabPFN-2.6's documented safe range more than 2000 does;
# may trigger pretraining-limit warnings already suppressed in canonical config).
experiment:
  run_name: "p5_ablation_topk_4000"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    use_diff_attn: false

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  tabpfn_oof_dir: data/redesign/top_k_variants/k4000
  tabpfn_outer_dir: data/redesign/top_k_variants/k4000

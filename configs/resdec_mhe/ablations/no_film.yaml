# ═══════════════════════════════════════════════════════════════════════════════
# Ablation: No FiLM metadata conditioning.
# ═══════════════════════════════════════════════════════════════════════════════
#
# Identical to canonical except use_film=False → ResDecH3Head bypasses FiLM
# entirely (z_cond = z_encoder, no metadata-derived modulation). Note the
# canonical run uses zero metadata, so FiLM's actual effect is bounded by
# near-identity init perturbation. This ablation removes even that
# perturbation by skipping the module entirely.

experiment:
  run_name: "p5_ablation_no_film"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    use_film: false  # ablation: bypass FiLM entirely

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  tabpfn_oof_dir: data/redesign
  tabpfn_outer_dir: data/redesign

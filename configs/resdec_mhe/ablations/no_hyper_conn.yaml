# ═══════════════════════════════════════════════════════════════════════════════
# Ablation: No Hyper-Connections (plain residual replaces multi-stream).
# ═══════════════════════════════════════════════════════════════════════════════
#
# Identical to canonical except use_hyper_conn=False → NPTStage uses
# x = x + ffn(norm(x)) (standard transformer residual) instead of the
# n_streams=4 HyperConnection multi-stream variant.

experiment:
  run_name: "p5_ablation_no_hyper_conn"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    use_hyper_conn: false  # ablation: plain residual in place of HyperConnection

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  tabpfn_oof_dir: data/redesign
  tabpfn_outer_dir: data/redesign

# Ablation: TabPFN input reduced from top-2000 → top-1000 XGBoost-importance
# features. Everything else matches canonical (n_stages=1, vanilla MHA, TabM(k=8),
# HyperConn, FiLM at zero metadata). Tests whether 2000 is above/below the
# informative-feature count.
experiment:
  run_name: "p5_ablation_topk_1000"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    use_diff_attn: false

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  # Point at the k=1000 TabPFN residual + outer caches produced by the top-k=1000 pipeline.
  tabpfn_oof_dir: data/canonical/top_k_variants/k1000
  tabpfn_outer_dir: data/canonical/top_k_variants/k1000

# ═══════════════════════════════════════════════════════════════════════════════
# Ablation: No TabPFN residual base.
# ═══════════════════════════════════════════════════════════════════════════════
#
# Trains the encoder + canonical n_stages=1 head on RAW cognition target
# (not residual y - y_tabpfn). Falls back to plain-MSE behavior in the
# Lightning module by omitting cfg.data.tabpfn_oof_dir / tabpfn_outer_dir.
#
# Compares against canonical to attribute the TabPFN-residual gain.

experiment:
  run_name: "p5_ablation_no_tabpfn"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    # k_tabm inherits canonical default (8) from resdec_h3_head.DEFAULT_K_TABM.

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  # Intentionally OMITTING tabpfn_oof_dir + tabpfn_outer_dir so the Lightning
  # module's plain-MSE fallback path activates. This is the "no TabPFN
  # residual" ablation.

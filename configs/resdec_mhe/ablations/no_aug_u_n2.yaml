# ═══════════════════════════════════════════════════════════════════════════════
# Ablation: No aug-U sigma weighting (only meaningful at n_stages>=2).
# ═══════════════════════════════════════════════════════════════════════════════
#
# At canonical n_stages=1, aug-U is bypassed entirely (only L_main + L_aux1,
# no aux_2/aux_3 to weight). To meaningfully ablate aug-U we run n_stages=2
# with use_sigma_weighting=False — direct comparison against the n=2 run
# that has sigma weighting enabled.

experiment:
  run_name: "p5_ablation_no_aug_u_n2"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 2
    aux_lambdas: [1.0, 1.0]
    use_sigma_weighting: false  # ablation: uniform-weight aux losses, no aug-U

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  tabpfn_oof_dir: data/canonical
  tabpfn_outer_dir: data/canonical

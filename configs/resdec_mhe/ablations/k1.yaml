# ═══════════════════════════════════════════════════════════════════════════════
# Phase 5.3 ablation #5: No TabM ensembling (k_tabm=1).
# ═══════════════════════════════════════════════════════════════════════════════
#
# Same as canonical except k_tabm=1 → TabMWrapper runs the NPTStage as a single
# (not ensembled) forward pass. Isolates the TabM-ensembling contribution
# (canonical R²=0.4373 vs k=1 here).

experiment:
  run_name: "p5_ablation_k1"

model:
  n_genes: 4785
  n_cell_types: 31
  resdec_head:
    d_metadata: 8
    n_heads: 4
    n_stages: 1
    aux_lambdas: [1.0]
    k_tabm: 1  # ablation: no ensembling

training:
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 20
  early_stopping:
    patience: 5
    min_epochs: 3
    min_delta: 0.0
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    batch_size: 24
  use_cached_embeddings: false
  tabpfn_oof_dir: data/redesign
  tabpfn_outer_dir: data/redesign

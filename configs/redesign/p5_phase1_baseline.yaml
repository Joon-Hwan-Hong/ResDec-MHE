# ═══════════════════════════════════════════════════════════════════════════════
# ResDec-H3 Phase 1 baseline: encoder + single-stage ResDec-H3 head
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file is an OVERRIDE — a training script is expected to load
# configs/default.yaml first, then merge this file via:
#
#     default_cfg  = OmegaConf.load("configs/default.yaml")
#     override_cfg = OmegaConf.load("configs/redesign/p5_phase1_baseline.yaml")
#     cfg = OmegaConf.merge(default_cfg, override_cfg)
#
# Rationale: OmegaConf does NOT auto-compose defaults the way Hydra does, so
# we avoid a `defaults:` block here and explicitly only specify the keys that
# differ from default.yaml for Phase 1.
#
# Phase-1 scope note: the ResDec-H3 head attached here is the single-stage
# composer (FiLM + NPTStage + scalar readout). H3 3-stage boosting, cross-stage
# attention, and TabPFN residual base are added in Phases 2–3.

experiment:
  run_name: "p5_phase1_baseline"

model:
  # Dataset-specific dims. n_genes defaults to null in default.yaml; fill it here
  # so the model can be built without a precomputed .pt header present.
  n_genes: 4785
  n_cell_types: 31
  # ResDec-H3 head config. d_metadata=8 is the FiLM conditioning input dim
  # (APOE_e4_count, APOE_e2_count, sex, age, age^2, PMI, education, pad → 8).
  resdec_head:
    d_metadata: 8
    n_heads: 4

training:
  # Flat-top-level overrides for ResDecLightningModule.configure_optimizers
  # (it reads `training.lr` first, falling back to `training.optimizer.lr`).
  lr: 0.0015
  weight_decay: 5.6e-6
  max_epochs: 60
  # Explicit override for Phase-1 min_epochs (default.yaml has 25, but the
  # ResDec-H3 head has fewer params than the full Bayesian SVI pipeline and
  # converges faster, so we relax the floor).
  early_stopping:
    patience: 10
    min_epochs: 5
    monitor: "val/r2"
    mode: "max"

data:
  dataloader:
    # Full-cohort NPT: one optimizer step per epoch, the whole train cohort
    # is a single batch so the NPT row-attention attends across all subjects
    # (Kossen et al., NeurIPS 2021 full-cohort mode). 500 is a ceiling — fold
    # train sizes are 412/413, so the DataLoader will just emit one batch with
    # however many subjects exist. batch_size=24 (in-batch NPT) was the Phase-1
    # default and caused the "NPT collapses to 24-subject row-attention"
    # behaviour flagged in code review (I1 / I10).
    batch_size: 500

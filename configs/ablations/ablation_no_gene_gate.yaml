experiment:
  name: cognitive_resilience_hpo7
  run_name: HPO_round7_warmstart
  seed: 42
  device: auto
data:
  adata_path: data/snRNAseq/adata_ROSMAP_merged.h5ad
  cellchatdb_path: data/database/CellChatDB_human_interaction.csv
  metadata_path: data/metadata_ROSMAP/
  liana_cache_dir: data/liana_cache/
  precomputed_dir: data/precomputed/
  preprocessing:
    n_hvg: 4000
    target_sum: 10000.0
    min_cells_per_gene: 10
  cell_type_column: supercluster_name
  subject_column: ROSMAP_IndividualID
  target_column: cogn_global
  pathology_columns:
  - gpath
  - amylsqrt
  - tangsqrt
  splits:
    test_frac: 0.1
    n_folds: 5
    stratify_by:
    - gpath
    - cogn_global
  cell_sampling:
    max_cells_per_type: 1000
    min_cells_threshold: 50
    sampling_strategy: random
  max_missing_subject_fraction: 0.1
  dataloader:
    batch_size: 24
    num_workers: 12
    pin_memory: true
    prefetch_factor: 2
model:
  n_genes: 4796
  n_cell_types: 31
  d_embed: 64
  d_fused: 64
  dropout: 0.23364921626695692
  gene_gate:
    initial_temperature: 100.0
  hgt:
    n_layers: 4
    n_heads: 4
    edge_types:
    - Secreted_Signaling
    - ECM_Receptor
    - Cell_Cell_Contact
    - Non_protein_Signaling
    - Novel_Uncharacterized
  set_transformer:
    n_isab_layers: 2
    n_inducing_points: 64
    n_pma_seeds: 1
    n_heads: 4
    condition_on_cell_type: true
  fusion:
    type: concat_normalized
    n_heads: 4
  pathology_attention:
    d_cond: 64
    n_heads: 4
    n_pathology_features: 3
  use_hgt_encoder: true
  use_cell_transformer: true
  use_gradient_checkpointing: true
  use_torch_compile: false
  head:
    type: bayesian
    d_hidden: 64
    target_mean: null
training:
  max_epochs: 100
  early_stopping:
    patience: 15
    min_delta: 0.0001
    min_epochs: 23
    monitor: val_nll
    mode: min
  optimizer:
    type: adamw
    lr: 0.0015046049708457242
    weight_decay: 5.634888826186702e-06
    betas:
    - 0.9
    - 0.999
    lrd: 0.9999
    guide_lr: 0.004360640680202658
  scheduler:
    type: cosine
    warmup_epochs: 5
    eta_min: 1.0e-06
  loss:
    type: beta_nll
    beta: 0.4223692687206656
  temperature_annealing:
    tau_max: 2.0
    tau_min: 1.8080229511190997
    warmup_epochs: 5
    anneal_epochs: 18
    schedule: exponential
  kl_annealing:
    enabled: true
    alpha_min: 0.01
    warmup_epochs: 5
    schedule: linear
    temperature: 1.0
  gradient_clip_val: 1.0
  gradient_modulation:
    enabled: false
    method: ogm_ge
    alpha: 1.0
    ge_enabled: true
    log_modulation: false
  precision: bf16-mixed
  devices: 1
  strategy: auto
  lr_scaling: true
  checkpoint:
    save_top_k: 3
    monitor: val_nll
    mode: min
    save_last: true
  regularization:
    gene_gate_l1: 0.0
  logging:
    log_every_n_steps: 10
    val_check_interval: 1.0
hpo:
  n_trials: 120
  per_trial_timeout: 7200
  search_space:
    lr:
      type: loguniform
      low: 0.0001
      high: 0.006
    dropout:
      type: uniform
      low: 0.0
      high: 0.4
    weight_decay:
      type: loguniform
      low: 1.0e-06
      high: 0.0005
    beta:
      type: uniform
      low: 0.05
      high: 0.8
    guide_lr:
      type: loguniform
      low: 0.001
      high: 0.035
    tau_min:
      type: uniform
      low: 1.5
      high: 2.0
    anneal_epochs:
      type: int
      low: 10
      high: 30
    gene_gate_temp:
      type: uniform
      low: 0.3
      high: 2.0
inference:
  num_posterior_samples: 100
  extract_attention: true
  attention_output_path: outputs/attention/
  batch_size: 32
paths:
  output_dir: outputs/
  checkpoint_dir: outputs/checkpoints/
  logs_dir: outputs/logs/
  figures_dir: outputs/figures/
  predictions_dir: outputs/predictions/
  attention_dir: outputs/attention/
error_handling:
  preprocessing:
    missing_metadata: warn
    corrupt_file: fail
    insufficient_cells: skip
  training:
    nan_loss: fail
    nan_batch: skip
    max_nan_skip_fraction: 0.1
  inference:
    missing_field: skip
  analysis:
    insufficient_data: skip
reproducibility:
  deterministic: true
  benchmark: false
visualization:
  dpi: 600
  format: png
analysis:
  resilience:
    n_permutations: 1000
    apply_fdr_correction: true
    fdr_method: benjamini_hochberg
    alpha: 0.05
    run_ablation_study: false
  output:
    save_attention_weights: true
    save_cell_level_attention: true
    top_n_genes: 100
    top_n_interactions: 100
_hpo_provenance:
  trial_id: b67416f2
  best_val_nll: 0.394174188375473
  best_epoch: 67
  rank: 3
_ablation:
  name: ablation_no_gene_gate
  description: Disable gene gate via very high temperature (uniform weights)
  base_config: rank03_trial_b67416f2 (HPO7)
